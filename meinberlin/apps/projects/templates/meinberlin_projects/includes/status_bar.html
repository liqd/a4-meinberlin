{% load i18n %}

<progress
  value="{{ progress }}"
  max="100"
  id="module-running-progress-{{ progress_bar_id }}"
  class="status-bar"
  aria-describedby="module-running-progress-{{ progress_bar_id }}-desc"
>
  {{ progress }}%
</progress>
<span id="module-running-progress-{{ progress_bar_id }}-desc" class="status-bar__timespan">
  <i class="far fa-clock" role="img" aria-label="{% translate 'Clock' %}"></i>
  {% blocktranslate %}remaining {{ time_left }}{% endblocktranslate %}
</span>
