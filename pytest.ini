[pytest]
DJANGO_SETTINGS_MODULE=meinberlin.config.settings.test
testpaths=tests
python_files=test_*.py
addopts = "--import-mode=importlib"
# Stable environment id from requirements (no quotes — pytest.ini keeps them in the value)
environment_expression = md5(open('requirements/dev.txt', encoding='utf-8').read() + open('requirements/base.txt', encoding='utf-8').read())
testmon_ignore_dependencies =
    coveralls
